name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Auto-bump version and create release
    runs-on: ubuntu-latest
    concurrency:
      # Serialize releases: a second push landing while the first run is
      # between its bump commit and the release creation would race on the
      # push or double-bump.
      group: aas-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22

      - name: Check if version was already bumped in this push
        id: check_bump
        run: |
          # Query CURRENT origin/main HEAD, not the event checkout: on a
          # workflow re-run the event SHA may be stale and the guard would
          # consult an older commit message, double-bumping the version.
          git fetch origin main --depth=1
          # Subject line only (%s, not %B): a commit whose BODY merely
          # mentions "release: v..." at a line start must not trip the guard.
          COMMIT_MSG=$(git log -1 --pretty=%s origin/main)
          if echo "$COMMIT_MSG" | grep -qE "^release: v"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            # On a re-run after the bump already landed, the event checkout
            # is the stale pre-bump SHA. Reset to current origin/main so the
            # steps below read the post-bump version.
            git reset --hard origin/main
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump patch version and push
        if: steps.check_bump.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "release: v$VERSION"
          # Pushes made with the default GITHUB_TOKEN do not retrigger
          # workflows, so this cannot loop.
          #
          # Main can advance mid-run (a PR merging between checkout and
          # here rejects the push as non-fast-forward — happened on run
          # 27448021952). Rebase the bump commit onto the new tip and
          # retry; bump commits only touch package.json's version line
          # and release runs are serialized, so the rebase stays clean.
          for i in 1 2 3; do
            if git push; then break; fi
            if [ "$i" = 3 ]; then echo "push failed after 3 attempts"; exit 1; fi
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
          done

      - name: Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        run: |
          # Idempotency against the target system (the release registry),
          # not git history: re-runs converge instead of failing on a
          # duplicate tag.
          if gh release view "${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get merged PR title
        if: steps.check.outputs.exists == 'false'
        id: pr
        run: |
          PR_TITLE=$(gh pr list --state merged --base main --limit 1 --json title -q '.[0].title // ""')
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "${{ steps.version.outputs.version }} — ${{ steps.pr.outputs.title }}"
          generate_release_notes: true
