services:
  - type: web
    name: aas-api
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install
    startCommand: pnpm --filter @aas/api start
    envVars:
      - key: PORT
        value: "4000"
      - key: FAL_KEY
        sync: false
      - key: SENSO_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-west-2
      - key: CLICKHOUSE_URL
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false

  - type: web
    name: aas-web
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install && pnpm --filter @aas/web build
    startCommand: pnpm --filter @aas/web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: aas-api
          envVarKey: RENDER_EXTERNAL_URL
