services:
  - type: web
    name: aas-api
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install
    startCommand: pnpm --filter @aas/api start
    disk:
      name: renders
      mountPath: /var/data/renders
      sizeGB: 10
    envVars:
      - key: PORT
        value: "4000"
      - key: RENDERS_DIR
        value: /var/data/renders
      - key: MPP_SECRET_KEY
        sync: false
      - key: FAL_KEY
        sync: false
      - key: SENSO_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLICKHOUSE_URL
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: COMPOSIO_API_KEY
        sync: false

  - type: web
    name: aas-web
    runtime: node
    plan: starter
    buildCommand: corepack enable && pnpm install && pnpm --filter @aas/web build
    startCommand: pnpm --filter @aas/web start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: aas-api
          envVarKey: RENDER_EXTERNAL_URL
